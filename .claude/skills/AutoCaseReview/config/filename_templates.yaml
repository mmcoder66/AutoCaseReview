# ============================================================================
# 文件名模板 — 修改这里即可调整所有生成文件的命名规则，无需改 Python 代码。
#
# 占位符（用 {占位符} 引用，未在上下文中提供的占位符会被替换为空字符串）：
#   {product}     产品名，例如 iBatchInsight
#   {title}       当前需求标题（已做文件名安全化处理，截断到 60 字符）
#   {iteration}   所属迭代，例如 CPV-SPx；跨多个迭代时为 "多迭代"
#   {version}     用户在生成前提供的版本号，例如 v1.0.1 / SP7（仅 SVN 文件使用）
#   {req_id}      当前需求 ID（去掉前导 #），例如 203726
#
# 文件名安全化：所有占位符的值会自动把 `/ \ : * ? " < > |` 替换为 `_`。
# ============================================================================

# SVN Excel（每条需求各一份）
svn_excel: "LC-SOP-RC-007-R02_测试用例评审_{product}_{title}_{version}.xlsx"

# SVN Word（每条需求各一份）
svn_word: "LC-SOP-RC-003-M01_会议纪要_{product}_测试用例评审_{title}_{version}.docx"

# 邮件 Word（每个迭代一份，不需要版本号）
email_word: "{product}_{iteration}_测试用例评审_邮件.docx"

# 输出子目录（位于 outputs/ 下，按文件类型分目录）
subdirs:
  svn_excel: "测试用例评审"
  svn_word: "会议纪要"
  email_word: "邮件"
